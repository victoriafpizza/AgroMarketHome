<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Login | AgroMarket</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="login.css" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>

  <header class="header">
    <div class="logo">
      <i class="fa-solid fa-leaf"></i>
      <span>AgroMarket</span>
    </div>

    <nav class="menu">
      <a href="index.html">Início</a>
      <a href="produtos.html">Produtos</a>
      <a href="maquinas.html">Máquinas</a>
      <a href="fretes.html">Fretes</a>
      <a href="como-funciona.html">Como funciona</a>
    </nav>

    <a class="btn-login" href="cadastro.html">Cadastrar</a>
  </header>

  <main class="login-container">
    <section class="login-box">

      <div class="login-info">
        <span class="tag">Bem-vindo de volta</span>
        <h1>Faça login</h1>
        <p>Acesse sua conta para comprar, vender ou anunciar no AgroMarket.</p>
      </div>

      <form class="login-form">
        <label>E-mail</label>
        <input type="email" placeholder="Digite seu e-mail" required>

        <label>Senha</label>
        <input type="password" placeholder="Digite sua senha" required>

        <button type="submit">Entrar</button>

        <p class="cadastro-link">
          Ainda não tem cadastro?
          <a href="cadastro.html">Criar conta</a>
        </p>
      </form>

    </section>
  </main>

</body>
</html>
