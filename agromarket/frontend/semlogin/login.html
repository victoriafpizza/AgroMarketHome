<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Login | AgroMarket</title>

  <link rel="stylesheet" href="/agromarket/frontend/css/style.css" />
  <link rel="stylesheet" href="/agromarket/frontend/css/login.css" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>

  <header class="header">
    <div class="logo">
      <i class="fa-solid fa-leaf"></i>
      <span>AgroMarket</span>
    </div>

    <nav class="menu">
      <a href="/agromarket/frontend/">Início</a>
      <a href="/agromarket/frontend/semlogin/produtos.html">Produtos</a>
      <a href="/agromarket/frontend/semlogin/maquinas.html">Máquinas</a>
      <a href="/agromarket/frontend/semlogin/fretes.html">Fretes</a>
      <a href="/agromarket/frontend/semlogin/como-funciona.html">Como funciona</a>
    </nav>

    <a class="btn-login" href="/agromarket/frontend/semlogin/cadastro.html">Cadastrar</a>
  </header>

  <main class="login-container">
    <section class="login-box">

      <div class="login-info">
        <span class="tag">Bem-vindo de volta</span>
        <h1>Faça login</h1>
        <p>Acesse sua conta para comprar, vender ou anunciar no AgroMarket.</p>
      </div>

      <form class="login-form">
        <label>E-mail</label>
        <input type="email" placeholder="Digite seu e-mail" required>

        <label>Senha</label>
        <input type="password" placeholder="Digite sua senha" required>

       <button type="submit" class="btn-entrar">
        <i class="fa-solid fa-right-to-bracket"></i>
        <a href="/agromarket/frontend/loginvend/painel.html" class="link-entrar">Entrar</a>
      </button>

        <p class="cadastro-link">
          Ainda não tem cadastro?
          <a href="/agromarket/frontend/semlogin/cadastro.html">Criar conta</a>
        </p>
      </form>

    </section>
  </main>

</body>
</html>
